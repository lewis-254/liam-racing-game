<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ferrari Turbo Dash — A Liam Project</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0010;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Arial Black', Arial, sans-serif;
    overflow: hidden;
    user-select: none;
  }
  #gameWrapper {
    position: relative;
    width: 420px;
    max-width: 100vw;
  }
  canvas {
    display: block;
    border: 3px solid #e30000;
    border-radius: 8px;
    box-shadow: 0 0 40px #e3000066, 0 0 80px #e3000033;
    width: 100%;
    height: auto;
  }
  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.87);
    border-radius: 6px;
    color: #fff;
    text-align: center;
    padding: 20px;
    gap: 0;
  }
  #overlay h1 {
    font-size: 2.2rem;
    color: #e30000;
    text-shadow: 0 0 20px #e30000, 0 0 40px #e30000;
    margin-bottom: 2px;
    letter-spacing: 2px;
  }
  #overlay .a-liam-project {
    font-size: 0.78rem;
    color: #ffcc00;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 10px;
    opacity: 0.9;
  }
  #overlay .instructions {
    font-size: 0.75rem;
    color: #aaa;
    margin-bottom: 12px;
    line-height: 1.7;
  }

  /* ── Nickname ── */
  .nick-section {
    margin-bottom: 12px;
    width: 100%;
  }
  .nick-section .lbl {
    font-size: 0.65rem;
    color: #888;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  #nicknameInput {
    background: #111;
    border: 2px solid #444;
    color: #fff;
    font-family: 'Arial Black', Arial, sans-serif;
    font-size: 0.9rem;
    padding: 6px 14px;
    border-radius: 8px;
    text-align: center;
    width: 160px;
    outline: none;
    letter-spacing: 1px;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  #nicknameInput:focus {
    border-color: #e30000;
    box-shadow: 0 0 8px #e3000066;
  }
  #nicknameInput::placeholder { color: #444; font-family: Arial; font-style: italic; }

  /* Level select */
  .level-section {
    margin-bottom: 12px;
    width: 100%;
  }
  .level-section .lbl {
    font-size: 0.72rem;
    color: #888;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 7px;
  }
  .lvl-pills {
    display: flex;
    gap: 8px;
    justify-content: center;
  }
  .lvl-btn {
    background: #1a1a1a;
    border: 2px solid #444;
    color: #aaa;
    font-family: 'Arial Black', Arial, sans-serif;
    font-size: 0.9rem;
    width: 42px; height: 34px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.12s;
  }
  .lvl-btn:hover { border-color: #e30000; color: #fff; }
  .lvl-btn.active {
    background: #e30000;
    border-color: #e30000;
    color: #fff;
    box-shadow: 0 0 12px #e30000aa;
  }

  /* ── Overlay mini-leaderboard ── */
  #overlayLb {
    width: 100%;
    margin-bottom: 10px;
    display: none;
  }
  .olb-title {
    font-size: 0.58rem;
    color: #e30000;
    letter-spacing: 2px;
    text-align: center;
    margin-bottom: 5px;
    text-shadow: 0 0 6px #e3000066;
  }
  .olb-row {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 2px 8px;
    border-radius: 3px;
  }
  .olb-row.olb-me { background: rgba(227,0,0,0.15); }
  .olb-pos { font-size: 0.6rem; color: #666; width: 18px; text-align: right; flex-shrink: 0; }
  .olb-row:first-of-type .olb-pos { color: #ffd700; }
  .olb-name {
    flex: 1; font-size: 0.7rem; color: #ccc;
    font-family: Arial, sans-serif;
    overflow: hidden; white-space: nowrap; text-overflow: ellipsis; text-align: left;
  }
  .olb-row.olb-me .olb-name { color: #fff; }
  .olb-score { font-size: 0.67rem; color: #ffd700; font-family: Arial, sans-serif; flex-shrink: 0; }

  /* Score area */
  #overlay .score-display {
    font-size: 1.4rem;
    color: #fff;
    margin-bottom: 2px;
  }
  #overlay .best-display {
    font-size: 0.85rem;
    color: #ffd700;
    margin-bottom: 12px;
  }
  #startBtn {
    background: linear-gradient(135deg, #e30000, #9b0000);
    color: #fff;
    border: none;
    padding: 13px 42px;
    font-size: 1.1rem;
    font-family: 'Arial Black', Arial, sans-serif;
    border-radius: 40px;
    cursor: pointer;
    letter-spacing: 1px;
    box-shadow: 0 0 24px #e30000aa;
    transition: transform 0.1s, box-shadow 0.1s;
  }
  #startBtn:hover { transform: scale(1.07); box-shadow: 0 0 36px #e30000cc; }
  #startBtn:active { transform: scale(0.96); }

  /* Controls row */
  #controls {
    display: flex;
    gap: 14px;
    margin-top: 12px;
    justify-content: center;
    align-items: center;
  }
  .ctrl-btn {
    background: #1a1a1a;
    border: 2px solid #e30000;
    color: #fff;
    font-size: 1.5rem;
    width: 68px; height: 68px;
    border-radius: 14px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 12px #e3000044;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.08s;
  }
  .ctrl-btn:active, .ctrl-btn.pressed { background: #e30000; }
  #btnPause {
    width: 54px; height: 54px;
    font-size: 1.2rem;
    border-color: #555;
    box-shadow: none;
  }
  #btnPause.paused { border-color: #ffcc00; color: #ffcc00; }

  /* HUD */
  #hud {
    position: absolute;
    top: 10px; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 0 12px;
    pointer-events: none;
    color: #fff;
    font-size: 0.8rem;
    text-shadow: 1px 1px 4px #000, 0 0 8px #000;
  }
  #hudLeft { display: flex; flex-direction: column; gap: 2px; }
  #hudBest { font-size: 0.68rem; color: #ffd700; opacity: 0.9; }
  #hudRight { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
  #hudRank { font-size: 0.68rem; color: #e30000; text-shadow: 0 0 6px #e3000088, 1px 1px 4px #000; }

  /* ── Game row (positions lb panel to the right on desktop) ── */
  #gameRow {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── Side / Below Leaderboard Panel ── */
  #lbPanel {
    width: 170px;
    background: rgba(0, 0, 10, 0.92);
    border: 2px solid #e30000;
    border-radius: 8px;
    box-shadow: 0 0 24px #e3000033;
    padding: 10px 8px 14px;
    color: #fff;
    font-family: 'Arial Black', Arial, sans-serif;
  }
  @media (min-width: 661px) {
    #lbPanel { position: absolute; left: calc(100% + 14px); top: 0; }
  }
  .lb-header {
    font-size: 0.6rem;
    color: #e30000;
    letter-spacing: 3px;
    text-align: center;
    margin-bottom: 10px;
    text-shadow: 0 0 8px #e3000066;
  }
  #lbList {
    position: relative;
    overflow: hidden;
    min-height: 28px;
    transition: height 0.3s ease;
  }
  .lb-entry {
    position: absolute;
    width: 100%;
    display: flex;
    align-items: center;
    gap: 3px;
    padding: 3px 4px;
    border-radius: 4px;
    transition: top 0.42s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    box-sizing: border-box;
  }
  .lb-entry.lb-current {
    background: rgba(227, 0, 0, 0.18);
    border: 1px solid rgba(227, 0, 0, 0.45);
  }
  @keyframes lbOvertakePulse {
    0%   { box-shadow: 0 0 0 0 rgba(0, 255, 120, 0.85); }
    60%  { box-shadow: 0 0 0 7px rgba(0, 255, 120, 0.2); }
    100% { box-shadow: 0 0 0 0 rgba(0, 255, 120, 0); }
  }
  .lb-entry.lb-overtake { animation: lbOvertakePulse 0.55s ease-out forwards; }
  .lb-pos {
    font-size: 0.58rem; color: #666;
    width: 20px; text-align: right; flex-shrink: 0;
  }
  .lb-entry.lb-current .lb-pos { color: #e30000; }
  .lb-name {
    flex: 1; font-size: 0.68rem; color: #ccc;
    font-family: Arial, sans-serif;
    overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
  }
  .lb-entry.lb-current .lb-name { color: #fff; font-weight: bold; }
  .lb-score {
    font-size: 0.65rem; color: #ffd700;
    font-family: Arial, sans-serif;
    flex-shrink: 0; min-width: 36px; text-align: right;
  }
  .lb-entry.lb-current .lb-score { color: #ff7777; }
  .lb-empty {
    font-size: 0.62rem; color: #444; text-align: center;
    padding: 6px 4px; font-family: Arial, sans-serif; line-height: 1.5;
  }

  @media (max-width: 660px) {
    body { overflow-y: auto; justify-content: flex-start; padding: 10px 0; }
    #lbPanel { width: calc(100vw - 20px); max-width: 420px; margin-top: 10px; }
    #lbList  { max-height: 140px; }
  }
</style>
</head>
<body>

<div id="gameRow">
<div id="gameWrapper">
  <canvas id="c" width="420" height="640"></canvas>
  <div id="hud">
    <div id="hudLeft">
      <span id="hudScore">Score: 0</span>
      <span id="hudBest">Best: 0</span>
    </div>
    <span id="hudLives">❤️❤️❤️</span>
    <div id="hudRight">
      <span id="hudSpeed">Lvl 1</span>
      <span id="hudRank"></span>
    </div>
  </div>
  <div id="overlay">
    <h1>🏎️ TURBO DASH</h1>
    <div class="a-liam-project">A Liam Project</div>
    <div class="instructions">
      Dodge the traffic — don't crash!<br>
      Grab the golden egg to restore a life!<br>
      ◀ ▶ Arrow keys · P to pause
    </div>

    <div class="nick-section">
      <div class="lbl">Your name</div>
      <input type="text" id="nicknameInput" maxlength="12" placeholder="Enter nickname"
             spellcheck="false" autocomplete="off" />
    </div>

    <div class="level-section">
      <div class="lbl">Start at level</div>
      <div class="lvl-pills">
        <button class="lvl-btn active" data-level="1">1</button>
        <button class="lvl-btn" data-level="2">2</button>
        <button class="lvl-btn" data-level="3">3</button>
        <button class="lvl-btn" data-level="4">4</button>
        <button class="lvl-btn" data-level="5">5</button>
      </div>
    </div>

    <div class="score-display" id="finalScore"></div>
    <div class="best-display"  id="bestScore"></div>

    <div id="overlayLb"></div>

    <button id="startBtn">START RACE 🚦</button>
  </div>

</div><!-- /gameWrapper -->

  <!-- Leaderboard panel: right of canvas on desktop, below on mobile -->
  <div id="lbPanel">
    <div class="lb-header">LEADERBOARD</div>
    <div id="lbList"></div>
  </div>
</div><!-- /gameRow -->

<div id="controls">
  <button class="ctrl-btn" id="btnLeft">◀</button>
  <button class="ctrl-btn" id="btnPause">⏸</button>
  <button class="ctrl-btn" id="btnRight">▶</button>
</div>

<script>
const canvas      = document.getElementById('c');
const ctx         = canvas.getContext('2d');
const W = 420, H = 640;

const overlay       = document.getElementById('overlay');
const startBtn      = document.getElementById('startBtn');
const finalScoreEl  = document.getElementById('finalScore');
const bestScoreEl   = document.getElementById('bestScore');
const hudScore      = document.getElementById('hudScore');
const hudBest       = document.getElementById('hudBest');
const hudLives      = document.getElementById('hudLives');
const hudSpeed      = document.getElementById('hudSpeed');
const hudRank       = document.getElementById('hudRank');
const btnLeft       = document.getElementById('btnLeft');
const btnRight      = document.getElementById('btnRight');
const btnPause      = document.getElementById('btnPause');
const nicknameInput = document.getElementById('nicknameInput');

const LANES        = [84, 168, 252, 336];
const CAR_H        = 90;
const ENEMY_COLORS = ['#1565C0','#2E7D32','#F57F17','#6A1B9A','#00695C','#37474F','#c62828'];
const ENEMY_SHAPES = ['sedan','sedan','truck','sport'];

// ─── Supabase config — paste your project URL and anon key here ──────────────
const SB_URL = 'https://jjvnnrxkavebegxrzwvw.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impqdm5ucnhrYXZlYmVneHJ6d3Z3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyNDEyMTMsImV4cCI6MjA5NTgxNzIxM30.audqMxIEb8YEUxM6uRPBkAYBai8OVvrXXcvVnKlJxL4';

let best       = parseInt(localStorage.getItem('turboBest') || '0');
let startLevel = 1;
let state, raf;
let countdownStart = 0;

// ─── Leaderboard ──────────────────────────────────────────────────────────────
let nickname     = localStorage.getItem('turboNickname') || '';
let cachedScores = [];
let lbLastRank   = 0;

nicknameInput.value = nickname;
nicknameInput.addEventListener('input', () => {
  nickname = nicknameInput.value;
  localStorage.setItem('turboNickname', nickname);
});

async function fetchScores() {
  try {
    const r = await fetch(
      `${SB_URL}/rest/v1/scores?select=nickname,score,level&order=score.desc&limit=10`,
      { headers: { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}` } }
    );
    if (r.ok) {
      cachedScores = await r.json();
      renderLb(state && state.score > 0 ? state.score : 0);
      renderOverlayLb();
    }
  } catch(e) { /* keep last cached data if offline */ }
}

async function submitScore(score, level) {
  if (score <= 0) return;
  const nick = nickname.trim() || 'Racer';
  try {
    await fetch(`${SB_URL}/rest/v1/rpc/submit_score`, {
      method: 'POST',
      headers: { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ p_nickname: nick, p_score: score, p_level: level })
    });
  } catch(e) {}
  await fetchScores();
}

// ── Side panel renderer ──
const lbEntryMap = new Map();
const LB_ENTRY_H = 28;
const LB_MAX     = 8;

function lbEsc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function buildLbData(liveScore) {
  const nick = nickname.trim() || 'You';
  const combined = cachedScores.map(s => ({
    key: 'h_' + s.nickname, nickname: s.nickname, score: s.score, isCurrent: false
  }));
  if (liveScore > 0) {
    const i = combined.findIndex(e => e.nickname === nick);
    if (i >= 0) combined.splice(i, 1);
    combined.push({ key: 'live', nickname: nick, score: liveScore, isCurrent: true });
    combined.sort((a, b) => b.score - a.score);
  }
  return combined.slice(0, LB_MAX);
}

function renderLb(liveScore) {
  const listEl = document.getElementById('lbList');
  const data   = buildLbData(liveScore);

  const emptyEl = listEl.querySelector('.lb-empty');
  if (data.length === 0) {
    if (!emptyEl) listEl.innerHTML = '<div class="lb-empty">No races yet!<br>Be the first.</div>';
    listEl.style.height = '46px';
    return;
  }
  if (emptyEl) emptyEl.remove();

  listEl.style.height = (data.length * LB_ENTRY_H) + 'px';

  const seen = new Set();
  data.forEach((item, rank) => {
    seen.add(item.key);
    let rec = lbEntryMap.get(item.key);
    if (!rec) {
      const el = document.createElement('div');
      el.className = 'lb-entry' + (item.isCurrent ? ' lb-current' : '');
      el.style.top = (rank * LB_ENTRY_H) + 'px';
      el.innerHTML =
        '<span class="lb-pos">#' + (rank+1) + '</span>' +
        '<span class="lb-name">' + lbEsc(item.nickname) + '</span>' +
        '<span class="lb-score">' + item.score.toLocaleString() + '</span>';
      listEl.appendChild(el);
      rec = { el, rank };
      lbEntryMap.set(item.key, rec);
    } else {
      rec.el.querySelector('.lb-pos').textContent   = '#' + (rank+1);
      rec.el.querySelector('.lb-name').textContent  = lbEsc(item.nickname);
      rec.el.querySelector('.lb-score').textContent = item.score.toLocaleString();
      if (rec.rank !== rank) {
        const movedDown = rank > rec.rank;
        if (item.isCurrent && !movedDown) {
          // Current player overtook someone — green pulse
          rec.el.classList.remove('lb-overtake');
          void rec.el.offsetWidth; // restart animation
          rec.el.classList.add('lb-overtake');
        } else if (!item.isCurrent && movedDown) {
          // This entry was overtaken — flash orange
          rec.el.style.background = 'rgba(255,100,0,0.3)';
          const el = rec.el;
          setTimeout(() => { el.style.background = ''; }, 700);
        }
        rec.el.style.top = (rank * LB_ENTRY_H) + 'px';
        rec.rank = rank;
      }
    }
  });

  for (const [key, rec] of lbEntryMap) {
    if (!seen.has(key)) { rec.el.remove(); lbEntryMap.delete(key); }
  }
}

function clearLb() {
  document.getElementById('lbList').innerHTML = '';
  lbEntryMap.clear();
}

function getLiveRank(score) {
  if (score <= 0 || cachedScores.length === 0) return 0;
  return cachedScores.filter(s => s.score > score).length + 1;
}

function renderOverlayLb() {
  const el = document.getElementById('overlayLb');
  if (cachedScores.length === 0) { el.style.display = 'none'; return; }
  el.style.display = '';
  const nick  = nickname.trim() || 'Racer';
  const top5  = cachedScores.slice(0, 5);
  el.innerHTML = '<div class="olb-title">TOP RACERS</div>' +
    top5.map((s, i) => {
      const me = s.nickname === nick;
      return '<div class="olb-row' + (me ? ' olb-me' : '') + '">' +
        '<span class="olb-pos">#' + (i+1) + '</span>' +
        '<span class="olb-name">' + lbEsc(s.nickname) + '</span>' +
        '<span class="olb-score">' + s.score.toLocaleString() + '</span>' +
        '</div>';
    }).join('');
}

// ─── Level select ─────────────────────────────────────────────────────────────
document.querySelectorAll('.lvl-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    startLevel = parseInt(btn.dataset.level);
    document.querySelectorAll('.lvl-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});

// ─── State init ───────────────────────────────────────────────────────────────
function initState(level) {
  return {
    phase: 'countdown',
    score: 0,
    lives: 3,
    speed: 4.8 + (level - 1) * 1.1,
    frameCount: 0,
    roadOffset: 0,
    player: { x: LANES[1], y: H - 120, lane: 1, flash: 0, invincible: 0 },
    enemies: [],
    eggs: [],
    eggSpawnCD: 480 + Math.floor(Math.random() * 360),
    particles: [],
    floaters: [],
    stars: Array.from({length: 60}, () => ({
      x: Math.random() * W, y: Math.random() * H,
      r: Math.random() * 1.5 + 0.3, speed: Math.random() * 0.4 + 0.15
    })),
    keys: { left: false, right: false },
    laneCD: 0,
    spawnCD: 50,
    combo: 0,
    comboTimer: 0,
    speedLevel: level,
    nextSpeedAt: 500,
    speedFlash: 0,
  };
}

state = initState(1);

// ─── Input ────────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft')  state.keys.left  = true;
  if (e.key === 'ArrowRight') state.keys.right = true;
  if (e.key === 'p' || e.key === 'P') togglePause();
  if ((e.key === ' ' || e.key === 'Enter') && (state.phase === 'idle' || state.phase === 'dead')) startGame();
  if (['ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
});
document.addEventListener('keyup', e => {
  if (e.key === 'ArrowLeft')  state.keys.left  = false;
  if (e.key === 'ArrowRight') state.keys.right = false;
});

function holdBtn(btn, key) {
  const on  = e => { e.preventDefault(); state.keys[key] = true;  btn.classList.add('pressed'); };
  const off = e => { e.preventDefault(); state.keys[key] = false; btn.classList.remove('pressed'); };
  btn.addEventListener('touchstart', on,  {passive: false});
  btn.addEventListener('touchend',   off, {passive: false});
  btn.addEventListener('touchcancel',off, {passive: false});
  btn.addEventListener('mousedown',  on);
  btn.addEventListener('mouseup',    off);
  btn.addEventListener('mouseleave', off);
}
holdBtn(btnLeft,  'left');
holdBtn(btnRight, 'right');

startBtn.addEventListener('click', startGame);
btnPause.addEventListener('click', togglePause);

// ─── Game control ─────────────────────────────────────────────────────────────
function startGame() {
  nickname = nicknameInput.value.trim() || 'Racer';
  localStorage.setItem('turboNickname', nickname);
  nicknameInput.value = nickname;

  clearLb();
  lbLastRank = 0;
  renderLb(0);
  fetchScores();

  state = initState(startLevel);
  state.phase = 'countdown';
  countdownStart = Date.now();
  overlay.style.display = 'none';
  if (!raf) loop();
}

function togglePause() {
  if (state.phase === 'playing') {
    state.phase = 'paused';
    cancelAnimationFrame(raf);
    raf = null;
    btnPause.textContent = '▶';
    btnPause.classList.add('paused');
    drawPauseOverlay();
  } else if (state.phase === 'paused') {
    state.phase = 'playing';
    btnPause.textContent = '⏸';
    btnPause.classList.remove('paused');
    loop();
  }
}

// ─── Draw helpers ─────────────────────────────────────────────────────────────
function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y); ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r); ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h); ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r); ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

function darken(hex) {
  const n = parseInt(hex.slice(1), 16);
  return `rgb(${Math.max(0,(n>>16)-50)},${Math.max(0,((n>>8)&0xff)-50)},${Math.max(0,(n&0xff)-50)})`;
}

function drawRoad() {
  const sky = ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0, '#03001a');
  sky.addColorStop(1, '#07002a');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);

  for (const s of state.stars) {
    ctx.globalAlpha = 0.7;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  const road = ctx.createLinearGradient(0,0,W,0);
  road.addColorStop(0, '#111');
  road.addColorStop(0.5, '#1c1c1c');
  road.addColorStop(1, '#111');
  ctx.fillStyle = road;
  ctx.fillRect(42, 0, W-84, H);

  ctx.fillStyle = '#e30000';
  ctx.fillRect(42, 0, 6, H);
  ctx.fillRect(W-48, 0, 6, H);

  ctx.setLineDash([38, 28]);
  ctx.lineDashOffset = -state.roadOffset;
  ctx.strokeStyle = '#ffffff28';
  ctx.lineWidth = 3;
  for (const lx of [126, 210, 294]) {
    ctx.beginPath(); ctx.moveTo(lx, 0); ctx.lineTo(lx, H); ctx.stroke();
  }
  ctx.setLineDash([]);
}

function drawFerrari() {
  const { x, y, flash, invincible } = state.player;
  const alpha = invincible > 0 ? (Math.floor(Date.now()/80) % 2 === 0 ? 0.35 : 1) : 1;
  ctx.globalAlpha = alpha;

  ctx.globalAlpha = alpha * 0.28;
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.ellipse(x, y+CAR_H/2-4, 22, 7, 0, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = alpha;

  const bodyCol = flash > 0 ? '#ff8888' : '#e30000';
  const grad = ctx.createLinearGradient(x-22, 0, x+22, 0);
  grad.addColorStop(0, '#9b0000');
  grad.addColorStop(0.3, bodyCol);
  grad.addColorStop(0.7, bodyCol);
  grad.addColorStop(1, '#9b0000');
  ctx.fillStyle = grad;
  roundRect(x-22, y-CAR_H/2, 44, CAR_H, 10); ctx.fill();

  ctx.fillStyle = '#820000';
  ctx.fillRect(x-24, y-CAR_H/2+6, 48, 7);

  ctx.fillStyle = '#1a3a5c';
  roundRect(x-13, y-CAR_H/2+18, 26, 30, 5); ctx.fill();
  ctx.strokeStyle = '#5599cc'; ctx.lineWidth = 1.5; ctx.stroke();

  ctx.font = 'bold 11px serif';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffcc00';
  ctx.fillText('🐎', x, y-CAR_H/2+57);

  const wheels = [
    [x-24, y-CAR_H/2+12], [x+12, y-CAR_H/2+12],
    [x-24, y+CAR_H/2-28], [x+12, y+CAR_H/2-28],
  ];
  for (const [wx, wy] of wheels) {
    ctx.fillStyle = '#0d0d0d';
    ctx.beginPath(); ctx.ellipse(wx+6, wy+7, 7, 9, 0, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#555'; ctx.lineWidth = 1.5; ctx.stroke();
    ctx.strokeStyle = '#aaa'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.ellipse(wx+6, wy+7, 3, 4, 0, 0, Math.PI*2); ctx.stroke();
  }

  const beam = ctx.createRadialGradient(x, y+CAR_H/2-8, 0, x, y+CAR_H/2-8, 30);
  beam.addColorStop(0, 'rgba(255,255,180,0.6)');
  beam.addColorStop(1, 'rgba(255,255,0,0)');
  ctx.fillStyle = beam;
  ctx.beginPath(); ctx.ellipse(x, y+CAR_H/2-8, 30, 20, 0, 0, Math.PI*2); ctx.fill();

  if (Math.random() < 0.5 && state.phase === 'playing') {
    state.particles.push({
      x: x+(Math.random()-0.5)*8, y: y-CAR_H/2+2,
      vx: (Math.random()-0.5)*1.2, vy: -1.2-Math.random()*1.5,
      life: 1, r: 2+Math.random()*3,
      col: Math.random()<0.5 ? '#ff6600' : '#999', expl: false
    });
  }
  ctx.globalAlpha = 1;
}

function drawEnemy(e) {
  const { x, y, color, shape } = e;
  const h = shape === 'truck' ? CAR_H*1.15 : CAR_H;
  const w = shape === 'truck' ? 46 : shape === 'sport' ? 36 : 40;

  ctx.globalAlpha = 0.92;
  ctx.fillStyle = '#00000044';
  ctx.beginPath(); ctx.ellipse(x, y+h/2-4, 20, 7, 0, 0, Math.PI*2); ctx.fill();

  const g = ctx.createLinearGradient(x-w/2, 0, x+w/2, 0);
  g.addColorStop(0, darken(color)); g.addColorStop(0.4, color);
  g.addColorStop(0.6, color); g.addColorStop(1, darken(color));
  ctx.fillStyle = g;
  roundRect(x-w/2, y-h/2, w, h, 8); ctx.fill();

  ctx.fillStyle = darken(color);
  if (shape === 'truck') ctx.fillRect(x-w/2+3, y-h/2+8, w-6, h*0.3);
  else { roundRect(x-12, y-h/2+18, 24, h*0.32, 4); ctx.fill(); }

  ctx.fillStyle = '#1a3a5c99';
  roundRect(x-10, y-h/2+22, 20, 16, 3); ctx.fill();

  ctx.fillStyle = '#0d0d0d';
  const wo = [[x-w/2-2,y-h/2+10],[x+w/2-10,y-h/2+10],[x-w/2-2,y+h/2-24],[x+w/2-10,y+h/2-24]];
  for (const [wx, wy] of wo) {
    ctx.beginPath(); ctx.ellipse(wx+6, wy+7, 6, 8, 0, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#444'; ctx.lineWidth = 1.2; ctx.stroke();
  }
  ctx.fillStyle = 'rgba(255,0,0,0.5)';
  ctx.beginPath(); ctx.ellipse(x-12, y+h/2-8, 5, 4, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(x+12, y+h/2-8, 5, 4, 0, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;
}

function drawEgg(egg) {
  const { x, y } = egg;
  const pulse = 0.85 + 0.15 * Math.sin(Date.now() / 180);
  const r = 16 * pulse;

  const glow = ctx.createRadialGradient(x, y, 0, x, y, r*2.8);
  glow.addColorStop(0, 'rgba(255,215,0,0.55)');
  glow.addColorStop(0.5, 'rgba(255,180,0,0.2)');
  glow.addColorStop(1, 'rgba(255,160,0,0)');
  ctx.fillStyle = glow;
  ctx.beginPath(); ctx.ellipse(x, y, r*2.8, r*2.8, 0, 0, Math.PI*2); ctx.fill();

  ctx.save();
  ctx.scale(1, 1.35);
  const eg = ctx.createRadialGradient(x-4, y/1.35-4, 2, x, y/1.35, r);
  eg.addColorStop(0, '#fff9a0'); eg.addColorStop(0.4, '#ffd700');
  eg.addColorStop(0.75, '#e8a000'); eg.addColorStop(1, '#b87800');
  ctx.fillStyle = eg;
  ctx.beginPath(); ctx.arc(x, y/1.35, r, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.45)';
  ctx.beginPath(); ctx.ellipse(x-4, y/1.35-5, r*0.38, r*0.22, -0.4, 0, Math.PI*2); ctx.fill();
  ctx.restore();

  ctx.font = `${Math.round(14*pulse)}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('❤️', x, y+1);
  ctx.textBaseline = 'alphabetic';
}

function drawParticles() {
  for (const p of state.particles) {
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.col;
    ctx.beginPath(); ctx.arc(p.x, p.y, Math.max(0.1, p.r*p.life), 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawFloaters() {
  for (const f of state.floaters) {
    ctx.globalAlpha = f.life;
    ctx.fillStyle = f.col || '#ffcc00';
    ctx.font = `bold ${f.size}px Arial Black`;
    ctx.textAlign = 'center';
    ctx.fillText(f.text, f.x, f.y);
  }
  ctx.globalAlpha = 1;
}

function drawCountdown() {
  const elapsed = (Date.now() - countdownStart) / 1000;
  if (elapsed >= 3.8) { state.phase = 'playing'; return; }

  let label, col;
  const t = elapsed % 1;
  const scale = 1 + (1 - t) * 0.65;

  if      (elapsed < 1) { label = '3'; col = '#e30000'; }
  else if (elapsed < 2) { label = '2'; col = '#ff8800'; }
  else if (elapsed < 3) { label = '1'; col = '#ffee00'; }
  else                  { label = 'GO!'; col = '#00ff55'; }

  ctx.save();
  ctx.translate(W/2, H/2 - 10);
  ctx.scale(scale, scale);
  ctx.shadowColor = col;
  ctx.shadowBlur = 50;
  ctx.font = label === 'GO!' ? 'bold 78px Arial Black' : 'bold 114px Arial Black';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = col;
  ctx.fillText(label, 0, 0);
  ctx.restore();
  ctx.shadowBlur = 0;
}

function drawPauseOverlay() {
  ctx.fillStyle = 'rgba(0,0,10,0.65)';
  ctx.fillRect(0, 0, W, H);

  ctx.shadowColor = '#fff';
  ctx.shadowBlur = 12;
  ctx.font = 'bold 52px Arial Black';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#fff';
  ctx.fillText('PAUSED', W/2, H/2 - 22);
  ctx.shadowBlur = 0;

  ctx.font = '16px Arial';
  ctx.fillStyle = '#aaa';
  ctx.fillText('Press P or ▶ to resume', W/2, H/2 + 22);
  ctx.textBaseline = 'alphabetic';
}

// ─── Update ───────────────────────────────────────────────────────────────────
function update() {
  const s = state;
  s.frameCount++;
  s.roadOffset = (s.roadOffset + s.speed) % (H/6);

  for (const st of s.stars) { st.y += st.speed; if (st.y > H) st.y = 0; }

  if (s.score >= s.nextSpeedAt) {
    s.speedLevel++;
    s.speed = 4.8 + (s.speedLevel - 1) * 1.1;
    s.nextSpeedAt += 500 + s.speedLevel * 150;
    s.speedFlash = 90;
    s.floaters.push({x: W/2, y: H/2-20, text: `LEVEL ${s.speedLevel} 🔥`, size: 26, life: 1, col: '#ff4400', vy: -0.5});
  }
  if (s.speedFlash > 0) s.speedFlash--;

  if (s.laneCD > 0) s.laneCD--;
  if (s.laneCD === 0) {
    if (s.keys.left && s.player.lane > 0) {
      s.player.lane--; s.player.x = LANES[s.player.lane]; s.laneCD = 16;
    } else if (s.keys.right && s.player.lane < 3) {
      s.player.lane++; s.player.x = LANES[s.player.lane]; s.laneCD = 16;
    }
  }

  s.spawnCD--;
  if (s.spawnCD <= 0) {
    s.enemies.push({
      x: LANES[Math.floor(Math.random()*4)], y: -70, lane: 0,
      color: ENEMY_COLORS[Math.floor(Math.random()*ENEMY_COLORS.length)],
      shape: ENEMY_SHAPES[Math.floor(Math.random()*ENEMY_SHAPES.length)],
      speed: s.speed*0.6 + Math.random()*1.2,
      passed: false
    });
    s.spawnCD = Math.max(18, 55 - s.speedLevel*3) + Math.floor(Math.random()*25);
  }

  for (const e of s.enemies) {
    e.y += e.speed + s.speed*0.7;
    if (!e.passed && e.y > s.player.y + CAR_H) {
      e.passed = true;
      s.score += 10 * s.speedLevel;
      s.combo++;
      if (s.combo > 1) {
        s.comboTimer = 80;
        s.floaters.push({x: s.player.x, y: s.player.y-50, text: `x${s.combo}`, size: 18, life: 1, col: '#ffcc00', vy: -0.9});
      }
    }
  }
  if (s.comboTimer > 0) s.comboTimer--; else if (s.comboTimer === 0) s.combo = 0;

  // Golden eggs
  s.eggSpawnCD--;
  if (s.eggSpawnCD <= 0) {
    s.eggs.push({ x: LANES[Math.floor(Math.random()*4)], y: -50 });
    s.eggSpawnCD = 520 + Math.floor(Math.random()*400);
  }
  for (const egg of s.eggs) {
    egg.y += s.speed * 0.85;
    if (Math.abs(egg.x - s.player.x) < 30 && Math.abs(egg.y - s.player.y) < 38) {
      egg.collected = true;
      if (s.lives < 5) {
        s.lives++;
        s.floaters.push({x: egg.x, y: egg.y-30, text: '❤️ +1 LIFE!', size: 20, life: 1, col: '#ffd700', vy: -1.1});
      } else {
        s.floaters.push({x: egg.x, y: egg.y-30, text: '✨ FULL HEALTH!', size: 18, life: 1, col: '#ffd700', vy: -1.1});
      }
      for (let i = 0; i < 16; i++) {
        const angle = (i/16)*Math.PI*2;
        s.particles.push({
          x: egg.x, y: egg.y,
          vx: Math.cos(angle)*(2+Math.random()*4), vy: Math.sin(angle)*(2+Math.random()*4),
          life: 1, r: 3+Math.random()*4,
          col: i%2===0 ? '#ffd700' : '#fff9a0', expl: true
        });
      }
    }
  }
  s.eggs = s.eggs.filter(e => !e.collected && e.y < H+80);

  // Collisions
  if (s.player.invincible > 0) {
    s.player.invincible--;
  } else {
    for (const e of s.enemies) {
      if (e.y < -80) continue;
      if (Math.abs(e.x - s.player.x) < 34 && Math.abs(e.y - s.player.y) < 68) {
        s.lives--;
        s.player.invincible = 130;
        s.player.flash = 25;
        s.combo = 0; s.comboTimer = 0;
        for (let i = 0; i < 24; i++) {
          const angle = Math.random()*Math.PI*2, spd = 2+Math.random()*6;
          s.particles.push({
            x: e.x, y: e.y, vx: Math.cos(angle)*spd, vy: Math.sin(angle)*spd,
            life: 1, r: 4+Math.random()*6,
            col: Math.random()<0.5 ? '#ff4400' : '#ffcc00', expl: true
          });
        }
        s.floaters.push({x: e.x, y: e.y-40, text: '💥 CRASH!', size: 20, life: 1, col: '#ff4400', vy: -1});
        e.y = H+300;
        if (s.lives <= 0) { s.phase = 'dead'; endGame(); }
        break;
      }
    }
  }

  for (const p of s.particles) {
    p.x += p.vx; p.y += p.vy;
    if (p.expl) { p.vy += 0.25; p.life -= 0.025; }
    else        { p.vy += 0.08; p.life -= 0.045; }
  }
  s.particles = s.particles.filter(p => p.life > 0);
  s.enemies   = s.enemies.filter(e => e.y < H+120);
  for (const f of s.floaters) { f.y += f.vy; f.life -= 0.018; }
  s.floaters  = s.floaters.filter(f => f.life > 0);
  if (s.player.flash > 0) s.player.flash--;

  hudScore.textContent = `Score: ${s.score}`;
  hudBest.textContent  = `Best: ${best}`;
  hudLives.textContent = '❤️'.repeat(s.lives) + '🖤'.repeat(Math.max(0, 3-s.lives));
  hudSpeed.textContent = `Lvl ${s.speedLevel}`;

  // Leaderboard update (throttled: every 30 frames ≈ 2× per second)
  if (s.frameCount % 30 === 0) {
    const rank = getLiveRank(s.score);
    if (rank > 0 && lbLastRank > 0 && rank < lbLastRank) {
      s.floaters.push({
        x: W/2, y: H/2 - 30,
        text: `#${rank} OVERTAKE! 🏁`,
        size: 19, life: 1, col: '#00ff88', vy: -0.55
      });
    }
    if (rank > 0) lbLastRank = rank;
    hudRank.textContent = rank > 0 ? `#${rank}` : '';
    renderLb(s.score);
  }
}

// ─── Draw frame ───────────────────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, W, H);
  drawRoad();
  drawParticles();
  for (const e of state.enemies) drawEnemy(e);
  for (const egg of state.eggs) drawEgg(egg);
  drawFerrari();
  drawFloaters();

  if (state.speedFlash > 0) {
    ctx.globalAlpha = (state.speedFlash / 90) * 0.25;
    ctx.fillStyle = '#e30000';
    ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = 1;
  }
}

function endGame() {
  if (state.score > best) { best = state.score; localStorage.setItem('turboBest', best); }
  submitScore(state.score, state.speedLevel);
  clearLb();
  renderLb(0);
  setTimeout(() => {
    finalScoreEl.textContent = `Score: ${state.score}`;
    bestScoreEl.textContent  = best > 0 ? `🏆 Best: ${best}` : '';
    startBtn.textContent     = 'RACE AGAIN! 🏁';
    btnPause.textContent     = '⏸';
    btnPause.classList.remove('paused');
    renderOverlayLb();
    overlay.style.display    = 'flex';
  }, 900);
}

// ─── Main loop ────────────────────────────────────────────────────────────────
function loop() {
  if (state.phase === 'playing') {
    update(); draw();
    raf = requestAnimationFrame(loop);
  } else if (state.phase === 'countdown') {
    // Road + car animate, enemies stay frozen
    state.roadOffset = (state.roadOffset + state.speed * 0.5) % (H/6);
    for (const st of state.stars) { st.y += st.speed; if (st.y > H) st.y = 0; }
    draw();
    drawCountdown();
    raf = requestAnimationFrame(loop);
  } else {
    draw(); raf = null;
  }
}

// Initial idle render
drawRoad();
hudBest.textContent = `Best: ${best}`;
cachedScores = [];
fetchScores();
renderLb(0);
renderOverlayLb();

// Poll for friends' scores every 30s during active play
setInterval(() => {
  if (state.phase === 'playing' || state.phase === 'paused') fetchScores();
}, 30000);
</script>
