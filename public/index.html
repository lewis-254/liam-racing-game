<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ferrari Turbo Dash — A Liam Project</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #07000f;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh;
    font-family: 'Arial Black', Arial, sans-serif;
    overflow: hidden; user-select: none;
  }
  #gameWrapper { position: relative; width: 420px; max-width: 100vw; }

  @keyframes canvasIdle {
    0%,100% { box-shadow: 0 0 28px #e3000055, 0 0 56px #e3000022; }
    50%      { box-shadow: 0 0 55px #e30000aa, 0 0 110px #e3000044; }
  }
  canvas#c {
    display: block; border: 3px solid #e30000; border-radius: 8px;
    width: 100%; height: auto;
    animation: canvasIdle 2.4s ease-in-out infinite;
  }
  canvas#c.playing { animation: none; box-shadow: 0 0 40px #e3000066, 0 0 80px #e3000033; }

  /* ── Overlay ── */
  #overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at 50% 15%, rgba(100,0,0,0.55) 0%, rgba(0,0,18,0.96) 65%);
    border-radius: 6px; color: #fff; text-align: center;
    padding: 14px 18px; gap: 0; overflow-y: auto;
  }
  #overlay h1 {
    font-family: 'Orbitron', 'Arial Black', Arial, sans-serif;
    font-size: 1.95rem; font-weight: 900; color: #e30000;
    text-shadow: 0 0 20px #e30000, 0 0 40px #e30000;
    margin-bottom: 1px; letter-spacing: 2px;
  }
  .a-liam-project {
    font-size: 0.65rem; color: #ffcc00; letter-spacing: 4px;
    text-transform: uppercase; margin-bottom: 7px; opacity: 0.9;
  }
  .instructions {
    font-size: 0.68rem; color: #999; margin-bottom: 9px; line-height: 1.75;
  }

  /* ── Nickname ── */
  .nick-section { margin-bottom: 9px; width: 100%; }
  .lbl { font-size: 0.58rem; color: #777; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 5px; }
  #nicknameInput {
    background: #111; border: 2px solid #444; color: #fff;
    font-family: 'Arial Black', Arial, sans-serif; font-size: 0.88rem;
    padding: 5px 14px; border-radius: 8px; text-align: center;
    width: 155px; outline: none; letter-spacing: 1px;
    transition: border-color .15s, box-shadow .15s;
  }
  #nicknameInput:focus { border-color: #e30000; box-shadow: 0 0 8px #e3000066; }
  #nicknameInput::placeholder { color: #444; font-family: Arial; font-style: italic; }

  /* ── Car section ── */
  .car-section { margin-bottom: 9px; width: 100%; }
  .car-type-row { display: flex; gap: 4px; justify-content: center; margin-bottom: 8px; flex-wrap: wrap; }
  .car-type-btn {
    background: #141414; border: 2px solid #3a3a3a; color: #777;
    font-family: Arial, sans-serif; font-size: 0.55rem;
    padding: 4px 6px; border-radius: 6px; cursor: pointer;
    transition: all .12s; line-height: 1.3; text-align: center; min-width: 54px;
  }
  .car-type-btn .ct-name { display: block; font-size: 0.68rem; font-weight: bold; color: #bbb; margin-bottom: 1px; }
  .car-type-btn:hover { border-color: #e30000; }
  .car-type-btn:hover .ct-name { color: #fff; }
  .car-type-btn.active { background: #1e0000; border-color: #e30000; box-shadow: 0 0 8px #e3000055; }
  .car-type-btn.active .ct-name { color: #ff4444; }
  .car-preview-row { display: flex; align-items: center; justify-content: center; gap: 14px; }
  #carPreview { border: 2px solid #2a2a2a; border-radius: 6px; background: #09091a; flex-shrink: 0; }
  .color-chips { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
  .color-chip {
    width: 26px; height: 26px; border-radius: 50%; border: 3px solid #2a2a2a;
    cursor: pointer; transition: transform .1s, border-color .1s;
  }
  .color-chip:hover { transform: scale(1.18); }
  .color-chip.active { border-color: #fff; box-shadow: 0 0 8px rgba(255,255,255,.55); }

  /* ── Level select ── */
  .level-section { margin-bottom: 9px; width: 100%; }
  .lvl-pills { display: flex; gap: 7px; justify-content: center; }
  .lvl-btn {
    background: #1a1a1a; border: 2px solid #444; color: #aaa;
    font-family: 'Arial Black', Arial, sans-serif; font-size: 0.88rem;
    width: 38px; height: 31px; border-radius: 7px; cursor: pointer; transition: all .12s;
  }
  .lvl-btn:hover { border-color: #e30000; color: #fff; }
  .lvl-btn.active { background: #e30000; border-color: #e30000; color: #fff; box-shadow: 0 0 12px #e30000aa; }

  /* ── Overlay leaderboard ── */
  #overlayLb { width: 100%; margin-bottom: 8px; display: none; }
  .olb-title { font-size: 0.54rem; color: #e30000; letter-spacing: 2px; text-align: center; margin-bottom: 4px; }
  .olb-row { display: flex; align-items: center; gap: 5px; padding: 2px 8px; border-radius: 3px; }
  .olb-row.olb-me { background: rgba(227,0,0,.14); }
  .olb-pos { font-size: 0.57rem; color: #666; width: 18px; text-align: right; flex-shrink: 0; }
  .olb-row:first-of-type .olb-pos { color: #ffd700; }
  .olb-name { flex: 1; font-size: 0.68rem; color: #ccc; font-family: Arial, sans-serif; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; text-align: left; }
  .olb-row.olb-me .olb-name { color: #fff; }
  .olb-score { font-size: 0.65rem; color: #ffd700; font-family: Arial, sans-serif; flex-shrink: 0; }

  /* ── Score / Best ── */
  .score-display { font-size: 1.3rem; color: #fff; margin-bottom: 2px; }
  .best-display  { font-size: 0.82rem; color: #ffd700; margin-bottom: 9px; }

  #startBtn {
    background: linear-gradient(135deg, #e30000, #880000);
    color: #fff; border: none; padding: 11px 36px;
    font-family: 'Orbitron', 'Arial Black', Arial, sans-serif;
    font-weight: 700; font-size: 0.95rem;
    border-radius: 40px; cursor: pointer; letter-spacing: 1px;
    box-shadow: 0 0 22px #e30000aa; transition: transform .1s, box-shadow .1s;
  }
  #startBtn:hover { transform: scale(1.06); box-shadow: 0 0 34px #e30000cc; }
  #startBtn:active { transform: scale(0.96); }

  /* ── Controls ── */
  #controls { display: flex; gap: 10px; margin-top: 11px; justify-content: center; align-items: center; }
  .ctrl-btn {
    background: #1a1a1a; border: 2px solid #e30000; color: #fff;
    font-size: 1.45rem; width: 60px; height: 60px; border-radius: 13px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 10px #e3000044; -webkit-tap-highlight-color: transparent;
    transition: background .08s;
  }
  .ctrl-btn:active, .ctrl-btn.pressed { background: #e30000; }
  #btnPause { width: 48px; height: 48px; font-size: 1.1rem; border-color: #555; box-shadow: none; }
  #btnPause.paused { border-color: #ffcc00; color: #ffcc00; }

  @keyframes boostReady {
    0%,100% { box-shadow: 0 0 8px #00aaff88; border-color: #0088cc; }
    50%      { box-shadow: 0 0 22px #00aaffcc, 0 0 38px #00aaff44; border-color: #44ccff; }
  }
  #btnBoost { border-color: #2a2a2a; color: #333; box-shadow: none; font-size: 1.2rem; }
  #btnBoost.ready { border-color: #00aaff; color: #00ccff; animation: boostReady .8s ease-in-out infinite; }
  #btnBoost.boosting { background: #003366; border-color: #44ccff; color: #aaffff; animation: none; }

  /* ── HUD ── */
  #hud {
    position: absolute; top: 10px; left: 0; right: 0;
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 0 12px; pointer-events: none;
    color: #fff; font-size: 0.8rem;
    text-shadow: 1px 1px 4px #000, 0 0 8px #000;
  }
  #hudLeft { display: flex; flex-direction: column; gap: 2px; }
  #hudBest { font-size: 0.64rem; color: #ffd700; opacity: .9; }
  #hudNitro { font-size: 0.7rem; letter-spacing: 2px; margin-top: 1px; }
  #hudRight { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
  #hudRank { font-size: 0.65rem; color: #e30000; text-shadow: 0 0 6px #e3000088, 1px 1px 4px #000; }

  /* ── Game row ── */
  #gameRow { position: relative; display: flex; flex-direction: column; align-items: center; }
  #lbPanel {
    width: 170px; background: rgba(0,0,10,.92); border: 2px solid #e30000;
    border-radius: 8px; box-shadow: 0 0 24px #e3000033;
    padding: 10px 8px 14px; color: #fff; font-family: 'Arial Black', Arial, sans-serif;
  }
  @media (min-width: 661px) { #lbPanel { position: absolute; left: calc(100% + 14px); top: 0; } }
  .lb-header { font-size: .6rem; color: #e30000; letter-spacing: 3px; text-align: center; margin-bottom: 10px; }
  #lbList { position: relative; overflow: hidden; min-height: 28px; transition: height .3s ease; }
  .lb-entry {
    position: absolute; width: 100%; display: flex; align-items: center;
    gap: 3px; padding: 3px 4px; border-radius: 4px; box-sizing: border-box;
    transition: top .42s cubic-bezier(.25,.46,.45,.94);
  }
  .lb-entry.lb-current { background: rgba(227,0,0,.18); border: 1px solid rgba(227,0,0,.45); }
  @keyframes lbOvertakePulse {
    0%   { box-shadow: 0 0 0 0 rgba(0,255,120,.85); }
    60%  { box-shadow: 0 0 0 7px rgba(0,255,120,.2); }
    100% { box-shadow: 0 0 0 0 rgba(0,255,120,0); }
  }
  .lb-entry.lb-overtake { animation: lbOvertakePulse .55s ease-out forwards; }
  .lb-pos { font-size: .58rem; color: #666; width: 20px; text-align: right; flex-shrink: 0; }
  .lb-entry.lb-current .lb-pos { color: #e30000; }
  .lb-name { flex: 1; font-size: .68rem; color: #ccc; font-family: Arial, sans-serif; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
  .lb-entry.lb-current .lb-name { color: #fff; font-weight: bold; }
  .lb-score { font-size: .65rem; color: #ffd700; font-family: Arial, sans-serif; flex-shrink: 0; min-width: 36px; text-align: right; }
  .lb-entry.lb-current .lb-score { color: #ff7777; }
  .lb-empty { font-size: .62rem; color: #444; text-align: center; padding: 6px 4px; font-family: Arial, sans-serif; line-height: 1.5; }

  @media (max-width: 660px) {
    body { overflow-y: auto; justify-content: flex-start; padding: 10px 0; }
    #lbPanel { width: calc(100vw - 20px); max-width: 420px; margin-top: 10px; }
    #lbList  { max-height: 140px; }
  }
</style>
</head>
<body>

<div id="gameRow">
<div id="gameWrapper">
  <canvas id="c" width="420" height="640"></canvas>
  <div id="hud">
    <div id="hudLeft">
      <span id="hudScore">Score: 0</span>
      <span id="hudBest">Best: 0</span>
      <span id="hudNitro" style="color:#333">○○○</span>
    </div>
    <span id="hudLives">❤️❤️❤️</span>
    <div id="hudRight">
      <span id="hudSpeed">Lvl 1</span>
      <span id="hudRank"></span>
    </div>
  </div>
  <div id="overlay">
    <h1>🏎️ TURBO DASH</h1>
    <div class="a-liam-project">A Liam Project</div>
    <div class="instructions">
      Dodge traffic · Grab ❤️ eggs to restore lives<br>
      Collect ⚡ nitro cans (×3) then press BOOST!<br>
      ◀ ▶ arrow keys &nbsp;·&nbsp; P pause &nbsp;·&nbsp; B boost
    </div>

    <div class="nick-section">
      <div class="lbl">Your name</div>
      <input type="text" id="nicknameInput" maxlength="12" placeholder="Enter nickname"
             spellcheck="false" autocomplete="off" />
    </div>

    <div class="car-section">
      <div class="lbl">Your Car</div>
      <div class="car-type-row" id="carTypePicker">
        <button class="car-type-btn" data-type="ferrari"><span class="ct-name">Ferrari</span>Balanced</button>
        <button class="car-type-btn" data-type="f1"><span class="ct-name">F1</span>×1.15 spd</button>
        <button class="car-type-btn" data-type="muscle"><span class="ct-name">Muscle</span>Wide</button>
        <button class="car-type-btn" data-type="suv"><span class="ct-name">SUV</span>+1 Life</button>
        <button class="car-type-btn" data-type="kart"><span class="ct-name">Kart</span>Nimble</button>
      </div>
      <div class="car-preview-row">
        <canvas id="carPreview" width="54" height="92"></canvas>
        <div class="color-chips" id="colorChips">
          <button class="color-chip" data-color="#e30000" style="background:#e30000" title="Classic Red"></button>
          <button class="color-chip" data-color="#1565C0" style="background:#1565C0" title="Electric Blue"></button>
          <button class="color-chip" data-color="#212121" style="background:#212121;border-color:#555" title="Midnight Black"></button>
          <button class="color-chip" data-color="#2E7D32" style="background:#2E7D32" title="Racing Green"></button>
          <button class="color-chip" data-color="#E65100" style="background:#E65100" title="Sunburst"></button>
          <button class="color-chip" data-color="#6A1B9A" style="background:#6A1B9A" title="Hyperviolet"></button>
        </div>
      </div>
    </div>

    <div class="level-section">
      <div class="lbl">Start at level</div>
      <div class="lvl-pills">
        <button class="lvl-btn active" data-level="1">1</button>
        <button class="lvl-btn" data-level="2">2</button>
        <button class="lvl-btn" data-level="3">3</button>
        <button class="lvl-btn" data-level="4">4</button>
        <button class="lvl-btn" data-level="5">5</button>
      </div>
    </div>

    <div class="score-display" id="finalScore"></div>
    <div class="best-display"  id="bestScore"></div>
    <div id="overlayLb"></div>
    <button id="startBtn">START RACE 🚦</button>
  </div>
</div>

<div id="lbPanel">
  <div class="lb-header">LEADERBOARD</div>
  <div id="lbList"></div>
</div>
</div>

<div id="controls">
  <button class="ctrl-btn" id="btnLeft">◀</button>
  <button class="ctrl-btn" id="btnPause">⏸</button>
  <button class="ctrl-btn" id="btnBoost">⚡</button>
  <button class="ctrl-btn" id="btnRight">▶</button>
</div>

<script>
const canvas      = document.getElementById('c');
const ctx         = canvas.getContext('2d');
const W = 420, H = 640;

const overlay       = document.getElementById('overlay');
const startBtn      = document.getElementById('startBtn');
const finalScoreEl  = document.getElementById('finalScore');
const bestScoreEl   = document.getElementById('bestScore');
const hudScore      = document.getElementById('hudScore');
const hudBest       = document.getElementById('hudBest');
const hudLives      = document.getElementById('hudLives');
const hudSpeed      = document.getElementById('hudSpeed');
const hudRank       = document.getElementById('hudRank');
const hudNitro      = document.getElementById('hudNitro');
const btnLeft       = document.getElementById('btnLeft');
const btnRight      = document.getElementById('btnRight');
const btnPause      = document.getElementById('btnPause');
const btnBoost      = document.getElementById('btnBoost');
const nicknameInput = document.getElementById('nicknameInput');
const gameWrapper   = document.getElementById('gameWrapper');
const carPreviewC   = document.getElementById('carPreview');
const pctx          = carPreviewC.getContext('2d');

const LANES        = [84, 168, 252, 336];
const CAR_H        = 90;
const ENEMY_COLORS = ['#1565C0','#2E7D32','#F57F17','#6A1B9A','#00695C','#37474F','#c62828'];
const ENEMY_SHAPES = ['sedan','sedan','truck','sport'];

// ── Car configs ───────────────────────────────────────────────────────────────
const CARS = {
  ferrari: { speedMod: 1.00, laneCD: 16, lives: 3, hitW: 44 },
  f1:      { speedMod: 1.15, laneCD: 10, lives: 3, hitW: 34 },
  muscle:  { speedMod: 0.92, laneCD: 22, lives: 3, hitW: 50 },
  suv:     { speedMod: 0.85, laneCD: 22, lives: 4, hitW: 48 },
  kart:    { speedMod: 1.00, laneCD: 10, lives: 3, hitW: 30 },
};
let carType  = localStorage.getItem('turboCarType')  || 'ferrari';
let carColor = localStorage.getItem('turboCarColor') || '#e30000';

// ── Supabase ──────────────────────────────────────────────────────────────────
const SB_URL = 'https://jjvnnrxkavebegxrzwvw.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impqdm5ucnhrYXZlYmVneHJ6d3Z3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyNDEyMTMsImV4cCI6MjA5NTgxNzIxM30.audqMxIEb8YEUxM6uRPBkAYBai8OVvrXXcvVnKlJxL4';

let best       = parseInt(localStorage.getItem('turboBest') || '0');
let startLevel = 1;
let state, raf;
let countdownStart = 0;

// ── Leaderboard ───────────────────────────────────────────────────────────────
let nickname     = localStorage.getItem('turboNickname') || '';
let cachedScores = [];
let lbLastRank   = 0;

nicknameInput.value = nickname;
nicknameInput.addEventListener('input', () => {
  nickname = nicknameInput.value;
  localStorage.setItem('turboNickname', nickname);
});

async function fetchScores() {
  try {
    const r = await fetch(
      `${SB_URL}/rest/v1/scores?select=nickname,score,level&order=score.desc&limit=10`,
      { headers: { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}` } }
    );
    if (r.ok) {
      cachedScores = await r.json();
      renderLb(state && state.score > 0 ? state.score : 0);
      renderOverlayLb();
    }
  } catch(e) {}
}

async function submitScore(score, level) {
  if (score <= 0) return;
  const nick = nickname.trim() || 'Racer';
  try {
    await fetch(`${SB_URL}/rest/v1/rpc/submit_score`, {
      method: 'POST',
      headers: { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ p_nickname: nick, p_score: score, p_level: level })
    });
  } catch(e) {}
  await fetchScores();
}

const lbEntryMap = new Map();
const LB_ENTRY_H = 28, LB_MAX = 8;

function lbEsc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function buildLbData(liveScore) {
  const nick = nickname.trim() || 'You';
  const combined = cachedScores.map(s => ({ key:'h_'+s.nickname, nickname:s.nickname, score:s.score, isCurrent:false }));
  if (liveScore > 0) {
    const i = combined.findIndex(e => e.nickname === nick);
    if (i >= 0) combined.splice(i, 1);
    combined.push({ key:'live', nickname:nick, score:liveScore, isCurrent:true });
    combined.sort((a,b) => b.score - a.score);
  }
  return combined.slice(0, LB_MAX);
}
function renderLb(liveScore) {
  const listEl = document.getElementById('lbList');
  const data   = buildLbData(liveScore);
  const emptyEl = listEl.querySelector('.lb-empty');
  if (data.length === 0) {
    if (!emptyEl) listEl.innerHTML = '<div class="lb-empty">No races yet!<br>Be the first.</div>';
    listEl.style.height = '46px'; return;
  }
  if (emptyEl) emptyEl.remove();
  listEl.style.height = (data.length * LB_ENTRY_H) + 'px';
  const seen = new Set();
  data.forEach((item, rank) => {
    seen.add(item.key);
    let rec = lbEntryMap.get(item.key);
    if (!rec) {
      const el = document.createElement('div');
      el.className = 'lb-entry' + (item.isCurrent ? ' lb-current' : '');
      el.style.top = (rank * LB_ENTRY_H) + 'px';
      el.innerHTML = '<span class="lb-pos">#'+(rank+1)+'</span><span class="lb-name">'+lbEsc(item.nickname)+'</span><span class="lb-score">'+item.score.toLocaleString()+'</span>';
      listEl.appendChild(el);
      rec = { el, rank }; lbEntryMap.set(item.key, rec);
    } else {
      rec.el.querySelector('.lb-pos').textContent   = '#'+(rank+1);
      rec.el.querySelector('.lb-name').textContent  = lbEsc(item.nickname);
      rec.el.querySelector('.lb-score').textContent = item.score.toLocaleString();
      if (rec.rank !== rank) {
        const movedDown = rank > rec.rank;
        if (item.isCurrent && !movedDown) {
          rec.el.classList.remove('lb-overtake'); void rec.el.offsetWidth; rec.el.classList.add('lb-overtake');
        } else if (!item.isCurrent && movedDown) {
          const el = rec.el; el.style.background = 'rgba(255,100,0,.3)';
          setTimeout(() => { el.style.background = ''; }, 700);
        }
        rec.el.style.top = (rank * LB_ENTRY_H) + 'px'; rec.rank = rank;
      }
    }
  });
  for (const [key, rec] of lbEntryMap) {
    if (!seen.has(key)) { rec.el.remove(); lbEntryMap.delete(key); }
  }
}
function clearLb() { document.getElementById('lbList').innerHTML = ''; lbEntryMap.clear(); }
function getLiveRank(score) {
  if (score <= 0 || cachedScores.length === 0) return 0;
  return cachedScores.filter(s => s.score > score).length + 1;
}
function renderOverlayLb() {
  const el = document.getElementById('overlayLb');
  if (cachedScores.length === 0) { el.style.display = 'none'; return; }
  el.style.display = '';
  const nick = nickname.trim() || 'Racer';
  el.innerHTML = '<div class="olb-title">TOP RACERS</div>' +
    cachedScores.slice(0,5).map((s,i) => {
      const me = s.nickname === nick;
      return '<div class="olb-row'+(me?' olb-me':'')+'"><span class="olb-pos">#'+(i+1)+'</span><span class="olb-name">'+lbEsc(s.nickname)+'</span><span class="olb-score">'+s.score.toLocaleString()+'</span></div>';
    }).join('');
}

// ── Car picker ────────────────────────────────────────────────────────────────
(function initPickers() {
  document.querySelectorAll('.car-type-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.type === carType);
  });

// ── Audio (Web Audio API) ─────────────────────────────────────────────────────
let audioCtx = null, engineOsc = null, engineGain = null;

function initAudio() {
  if (audioCtx) return;
  try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
}
function playSound(type) {
  if (!audioCtx) return;
  try {
    const ac = audioCtx, t = ac.currentTime;
    if (type === 'countdown') {
      const o = ac.createOscillator(), g = ac.createGain();
      o.type = 'sawtooth'; o.frequency.setValueAtTime(100, t); o.frequency.exponentialRampToValueAtTime(45, t+.2);
      g.gain.setValueAtTime(.4, t); g.gain.exponentialRampToValueAtTime(.001, t+.28);
      o.connect(g); g.connect(ac.destination); o.start(t); o.stop(t+.3);
    } else if (type === 'go') {
      [0,4,7].forEach((s,i) => {
        const o = ac.createOscillator(), g = ac.createGain();
        o.type = 'triangle'; o.frequency.value = 220 * Math.pow(2, s/12);
        g.gain.setValueAtTime(0, t+i*.05); g.gain.linearRampToValueAtTime(.3, t+i*.05+.06);
        g.gain.exponentialRampToValueAtTime(.001, t+.7);
        o.connect(g); g.connect(ac.destination); o.start(t+i*.05); o.stop(t+.75);
      });
    } else if (type === 'crash') {
      const buf = ac.createBuffer(1, ac.sampleRate*.25, ac.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1)*(1-i/d.length);
      const s = ac.createBufferSource(), g = ac.createGain();
      const f = ac.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 900;
      s.buffer = buf; g.gain.value = .8; s.connect(f); f.connect(g); g.connect(ac.destination); s.start(t);
    } else if (type === 'nitro') {
      [440, 660].forEach((freq, i) => {
        const o = ac.createOscillator(), g = ac.createGain();
        o.type = 'sine'; o.frequency.value = freq;
        g.gain.setValueAtTime(.25, t+i*.13); g.gain.exponentialRampToValueAtTime(.001, t+i*.13+.2);
        o.connect(g); g.connect(ac.destination); o.start(t+i*.13); o.stop(t+i*.13+.22);
      });
    } else if (type === 'boost') {
      const o = ac.createOscillator(), g = ac.createGain();
      o.type = 'sawtooth'; o.frequency.setValueAtTime(200, t); o.frequency.exponentialRampToValueAtTime(2000, t+.4);
      g.gain.setValueAtTime(.45, t); g.gain.exponentialRampToValueAtTime(.001, t+.5);
      o.connect(g); g.connect(ac.destination); o.start(t); o.stop(t+.52);
    } else if (type === 'egg') {
      const o = ac.createOscillator(), g = ac.createGain();
      o.type = 'sine'; o.frequency.setValueAtTime(330, t); o.frequency.exponentialRampToValueAtTime(660, t+.28);
      g.gain.setValueAtTime(.3, t); g.gain.exponentialRampToValueAtTime(.001, t+.38);
      o.connect(g); g.connect(ac.destination); o.start(t); o.stop(t+.4);
    } else if (type === 'coin') {
      const o = ac.createOscillator(), g = ac.createGain();
      o.type = 'sine'; o.frequency.setValueAtTime(880, t); o.frequency.setValueAtTime(1100, t+.07);
      g.gain.setValueAtTime(.2, t); g.gain.exponentialRampToValueAtTime(.001, t+.16);
      o.connect(g); g.connect(ac.destination); o.start(t); o.stop(t+.18);
    } else if (type === 'levelup') {
      [0,4,7,12].forEach((s,i) => {
        const o = ac.createOscillator(), g = ac.createGain();
        o.type = 'square'; o.frequency.value = 220 * Math.pow(2, s/12);
        g.gain.setValueAtTime(0, t+i*.08); g.gain.linearRampToValueAtTime(.2, t+i*.08+.05);
        g.gain.exponentialRampToValueAtTime(.001, t+.6);
        o.connect(g); g.connect(ac.destination); o.start(t+i*.08); o.stop(t+.65);
      });
    } else if (type === 'gameover') {
      const o = ac.createOscillator(), g = ac.createGain();
      o.type = 'sawtooth'; o.frequency.setValueAtTime(400, t); o.frequency.exponentialRampToValueAtTime(80, t+1.1);
      g.gain.setValueAtTime(.4, t); g.gain.exponentialRampToValueAtTime(.001, t+1.2);
      o.connect(g); g.connect(ac.destination); o.start(t); o.stop(t+1.25);
    }
  } catch(e) {}
}
function startEngine(speed) {
  if (!audioCtx) return;
  try {
    stopEngine();
    engineOsc = audioCtx.createOscillator(); engineGain = audioCtx.createGain();
    engineOsc.type = 'triangle'; engineOsc.frequency.value = 60 + speed * 4;
    engineGain.gain.value = .06;
    engineOsc.connect(engineGain); engineGain.connect(audioCtx.destination); engineOsc.start();
  } catch(e) {}
}
function updateEngine(speed) {
  try { if (engineOsc) engineOsc.frequency.value = 60 + speed * 4; } catch(e) {}
}
function stopEngine() {
  try { if (engineOsc) { engineOsc.stop(); engineOsc.disconnect(); } } catch(e) {}
  engineOsc = null; engineGain = null;
}

// ── Colour helpers ────────────────────────────────────────────────────────────
function darken(hex) {
  const n = parseInt(hex.slice(1),16);
  return `rgb(${Math.max(0,(n>>16)-50)},${Math.max(0,((n>>8)&0xff)-50)},${Math.max(0,(n&0xff)-50)})`;
}
function darkenColor(hex, f=.5) {
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return `rgb(${Math.round(r*f)},${Math.round(g*f)},${Math.round(b*f)})`;
}

// ── Draw helpers ──────────────────────────────────────────────────────────────
function roundRect(x,y,w,h,r,c) {
  c = c||ctx;
  c.beginPath(); c.moveTo(x+r,y);
  c.lineTo(x+w-r,y); c.quadraticCurveTo(x+w,y,x+w,y+r);
  c.lineTo(x+w,y+h-r); c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  c.lineTo(x+r,y+h); c.quadraticCurveTo(x,y+h,x,y+h-r);
  c.lineTo(x,y+r); c.quadraticCurveTo(x,y,x+r,y); c.closePath();
}

  if(shape==='truck') ctx.fillRect(x-w/2+3,y-h/2+8,w-6,h*.3);
  else { roundRect(x-12,y-h/2+18,24,h*.32,4); ctx.fill(); }
  ctx.fillStyle='#1a3a5c99'; roundRect(x-10,y-h/2+22,20,16,3); ctx.fill();
  ctx.fillStyle='#0d0d0d';
  [[x-w/2-2,y-h/2+10],[x+w/2-10,y-h/2+10],[x-w/2-2,y+h/2-24],[x+w/2-10,y+h/2-24]].forEach(([wx,wy])=>{
    ctx.beginPath(); ctx.ellipse(wx+6,wy+7,6,8,0,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#444'; ctx.lineWidth=1.2; ctx.stroke();
  });
  ctx.fillStyle='rgba(255,0,0,.5)';
  ctx.beginPath(); ctx.ellipse(x-12,y+h/2-8,5,4,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(x+12,y+h/2-8,5,4,0,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=1;
}

// ── Pickups ───────────────────────────────────────────────────────────────────
function drawEgg(egg) {
  const {x,y}=egg;
  const pulse=.85+.15*Math.sin(Date.now()/180), r=16*pulse;
  const glow=ctx.createRadialGradient(x,y,0,x,y,r*2.8);
  glow.addColorStop(0,'rgba(255,215,0,.55)'); glow.addColorStop(.5,'rgba(255,180,0,.2)'); glow.addColorStop(1,'rgba(255,160,0,0)');
  ctx.fillStyle=glow; ctx.beginPath(); ctx.ellipse(x,y,r*2.8,r*2.8,0,0,Math.PI*2); ctx.fill();
  ctx.save(); ctx.scale(1,1.35);
  const eg=ctx.createRadialGradient(x-4,y/1.35-4,2,x,y/1.35,r);
  eg.addColorStop(0,'#fff9a0'); eg.addColorStop(.4,'#ffd700'); eg.addColorStop(.75,'#e8a000'); eg.addColorStop(1,'#b87800');
  ctx.fillStyle=eg; ctx.beginPath(); ctx.arc(x,y/1.35,r,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.45)'; ctx.beginPath(); ctx.ellipse(x-4,y/1.35-5,r*.38,r*.22,-.4,0,Math.PI*2); ctx.fill();
  ctx.restore();
  ctx.font=`${Math.round(14*pulse)}px serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('❤️',x,y+1); ctx.textBaseline='alphabetic';
}
function drawNitroCan(x,y) {
  const pulse=.85+.15*Math.sin(Date.now()/200);
  const glow=ctx.createRadialGradient(x,y,0,x,y,22*pulse);
  glow.addColorStop(0,'rgba(0,180,255,.5)'); glow.addColorStop(.5,'rgba(0,100,255,.2)'); glow.addColorStop(1,'rgba(0,50,255,0)');
  ctx.fillStyle=glow; ctx.beginPath(); ctx.ellipse(x,y,22*pulse,22*pulse,0,0,Math.PI*2); ctx.fill();
  ctx.save(); ctx.translate(x,y);
  const cg=ctx.createLinearGradient(-10,0,10,0);
  cg.addColorStop(0,'#0044aa'); cg.addColorStop(.4,'#0099ff'); cg.addColorStop(.6,'#0099ff'); cg.addColorStop(1,'#0044aa');
  ctx.fillStyle=cg; roundRect(-10,-16,20,28,4); ctx.fill();
  ctx.fillStyle='#00ccff'; roundRect(-6,-20,12,6,2); ctx.fill();
  ctx.fillStyle='#aaa'; roundRect(-3,-25,6,7,2); ctx.fill();
  ctx.fillStyle='#fff'; ctx.font='bold 8px Arial'; ctx.textAlign='center';
  ctx.textBaseline='middle'; ctx.fillText('⚡',0,4); ctx.textBaseline='alphabetic';
  ctx.restore();
}
function drawCoin(x,y) {
  const pulse=.9+.1*Math.sin(Date.now()/250), r=8*pulse;
  const glow=ctx.createRadialGradient(x,y,0,x,y,r*2.5);
  glow.addColorStop(0,'rgba(255,220,0,.4)'); glow.addColorStop(1,'rgba(255,180,0,0)');
  ctx.fillStyle=glow; ctx.beginPath(); ctx.arc(x,y,r*2.5,0,Math.PI*2); ctx.fill();
  const cg=ctx.createRadialGradient(x-2,y-2,1,x,y,r);
  cg.addColorStop(0,'#fffaaa'); cg.addColorStop(.5,'#ffd700'); cg.addColorStop(1,'#b8860b');
  ctx.fillStyle=cg; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#a06010'; ctx.font=`bold ${Math.round(8*pulse)}px Arial`;
  ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('$',x,y); ctx.textBaseline='alphabetic';
}

// ── Effects ───────────────────────────────────────────────────────────────────
function drawParticles() {
  for(const p of state.particles){
    ctx.globalAlpha=Math.max(0,p.life); ctx.fillStyle=p.col;
    ctx.beginPath(); ctx.arc(p.x,p.y,Math.max(.1,p.r*p.life),0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
}
function drawFloaters() {
  for(const f of state.floaters){
    ctx.globalAlpha=f.life; ctx.fillStyle=f.col||'#ffcc00';
    ctx.font=`bold ${f.size}px Arial Black`; ctx.textAlign='center';
    ctx.fillText(f.text,f.x,f.y);
  }
  ctx.globalAlpha=1;
}
function drawDriftTrails() {
  for(const t of state.driftTrails){
    ctx.globalAlpha=t.life*.45; ctx.strokeStyle='#3a3a3a'; ctx.lineWidth=3;
    ctx.setLineDash([4,4]);
    ctx.beginPath(); ctx.moveTo(t.x1,t.y); ctx.lineTo(t.x1,t.y+18); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(t.x2,t.y); ctx.lineTo(t.x2,t.y+18); ctx.stroke();
    ctx.setLineDash([]);
  }
  ctx.globalAlpha=1;
}
function drawSpeedLines() {
  const fc=state.frameCount;
  ctx.save();
  for(let i=0;i<22;i++){
    const seed=((fc*7+i*37)%100)/100;
    const y=(fc*14+i*(H/22))%H, len=45+seed*85, x=48+seed*(W-110);
    ctx.globalAlpha=.08+seed*.28; ctx.strokeStyle='#aaddff';
    ctx.lineWidth=.5+seed*1.5; ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x+len,y); ctx.stroke();
  }
  ctx.globalAlpha=1; ctx.restore();
}
function drawBoostOverlay() {
  const a=.18+.12*Math.sin(state.frameCount*.18);
  const eg=ctx.createLinearGradient(0,0,W,0);
  eg.addColorStop(0,`rgba(0,150,255,${a})`); eg.addColorStop(.15,'rgba(0,150,255,0)');
  eg.addColorStop(.85,'rgba(0,150,255,0)'); eg.addColorStop(1,`rgba(0,150,255,${a})`);
  ctx.fillStyle=eg; ctx.fillRect(0,0,W,H);
  const tg=ctx.createLinearGradient(0,0,0,H);
  tg.addColorStop(0,`rgba(0,150,255,${a})`); tg.addColorStop(.1,'rgba(0,150,255,0)');
  tg.addColorStop(.9,'rgba(0,150,255,0)'); tg.addColorStop(1,`rgba(0,150,255,${a})`);
  ctx.fillStyle=tg; ctx.fillRect(0,0,W,H);
}
function drawLowLifeVignette() {
  if(!state||state.lives>1) return;
  const a=.35+.2*Math.sin(Date.now()/320);
  const vg=ctx.createRadialGradient(W/2,H/2,H*.28,W/2,H/2,H*.72);
  vg.addColorStop(0,'rgba(160,0,0,0)'); vg.addColorStop(1,`rgba(160,0,0,${a})`);
  ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);
}
function drawCelebParticles() {
  for(const p of state.celebParticles){
    ctx.globalAlpha=Math.max(0,p.life); ctx.fillStyle=p.col;
    ctx.beginPath(); ctx.arc(p.x,p.y,Math.max(.5,p.r*p.life*.7+p.r*.3),0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
}
function drawCountdown() {
  const elapsed=(Date.now()-countdownStart)/1000;
  if(elapsed>=3.8){ state.phase='playing'; canvas.classList.add('playing'); updateEngine(state.speed); return; }
  let label,col;
  const t=elapsed%1, scale=1+(1-t)*.7;
  if(elapsed<1){label='3';col='#e30000';}
  else if(elapsed<2){label='2';col='#ff8800';}
  else if(elapsed<3){label='1';col='#ffee00';}
  else{label='GO!';col='#00ff55';}
  // Ring
  const ringR=Math.min(t,1)*120;
  ctx.globalAlpha=(1-t)*.5; ctx.strokeStyle=col; ctx.lineWidth=3;
  ctx.beginPath(); ctx.arc(W/2,H/2-10,ringR,0,Math.PI*2); ctx.stroke();
  ctx.globalAlpha=1;
  ctx.save(); ctx.translate(W/2,H/2-10); ctx.scale(scale,scale);
  ctx.shadowColor=col; ctx.shadowBlur=50;
  ctx.font=label==='GO!'?'bold 78px Arial Black':'bold 114px Arial Black';
  ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillStyle=col;
  ctx.fillText(label,0,0); ctx.restore(); ctx.shadowBlur=0;
}
function drawPauseOverlay() {
  ctx.fillStyle='rgba(0,0,10,.65)'; ctx.fillRect(0,0,W,H);
  ctx.shadowColor='#fff'; ctx.shadowBlur=12;
  ctx.font='bold 52px Arial Black'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle='#fff'; ctx.fillText('PAUSED',W/2,H/2-22); ctx.shadowBlur=0;
  ctx.font='16px Arial'; ctx.fillStyle='#aaa'; ctx.fillText('Press P or ▶ to resume',W/2,H/2+22);
  ctx.textBaseline='alphabetic';
}

// ── Boost activation ──────────────────────────────────────────────────────────
function activateBoost() {
  if(!state||state.phase!=='playing'||state.nitroCount<3||state.boostActive) return;
  state.boostActive=true; state.boostTimer=180; state.nitroCount=0;
  state.score+=50*state.speedLevel;
  state.enemies.forEach(e=>{ e.y=H+500; });
  canvas.style.filter='blur(.8px) brightness(1.28)';
  playSound('boost');
  btnBoost.classList.remove('ready'); btnBoost.classList.add('boosting');
}

// ── Update ────────────────────────────────────────────────────────────────────
function update() {
  const s=state;
  s.frameCount++;

  // Boost timer
  if(s.boostActive){
    s.boostTimer--;
    if(s.boostTimer<=0){
      s.boostActive=false; canvas.style.filter='';
      btnBoost.classList.remove('boosting');
      s.floaters.push({x:W/2,y:H/2-30,text:'NITRO! 🔥',size:24,life:1,col:'#00aaff',vy:-.6});
    }
  }

  const roadMult=s.boostActive?3.5:1;
  s.roadOffset=(s.roadOffset+s.speed*roadMult)%(H/6);
  for(const st of s.stars){st.y+=st.speed; if(st.y>H) st.y=0;}

  // Level up
  if(s.score>=s.nextSpeedAt){
    s.speedLevel++; s.speed=4.8+(s.speedLevel-1)*1.1;
    s.nextSpeedAt+=500+s.speedLevel*150; s.speedFlash=90;
    playSound('levelup');
    s.floaters.push({x:W/2,y:H/2-20,text:`LEVEL ${s.speedLevel} 🔥`,size:26,life:1,col:'#ff4400',vy:-.5});
    updateEngine(s.speed);
  }
  if(s.speedFlash>0) s.speedFlash--;

  // Lane change
  if(s.laneCD>0) s.laneCD--;
  if(s.laneCD===0){
    if(s.keys.left && s.player.lane>0){
      const prevX=s.player.x;
      s.player.lane--; s.player.x=LANES[s.player.lane]; s.laneCD=s.laneCD_base;
      if(s.speedLevel>=3) s.driftTrails.push({x1:prevX+18,x2:prevX-18,y:s.player.y+CAR_H/2-22,life:1});
    } else if(s.keys.right && s.player.lane<3){
      const prevX=s.player.x;
      s.player.lane++; s.player.x=LANES[s.player.lane]; s.laneCD=s.laneCD_base;
      if(s.speedLevel>=3) s.driftTrails.push({x1:prevX+18,x2:prevX-18,y:s.player.y+CAR_H/2-22,life:1});
    }
  }

  // Enemies
  if(!s.boostActive){
    s.spawnCD--;
    if(s.spawnCD<=0){
      s.enemies.push({
        x:LANES[Math.floor(Math.random()*4)], y:-70,
        color:ENEMY_COLORS[Math.floor(Math.random()*ENEMY_COLORS.length)],
        shape:ENEMY_SHAPES[Math.floor(Math.random()*ENEMY_SHAPES.length)],
        speed:s.speed*.6+Math.random()*1.2, passed:false, nearMissed:false
      });
      s.spawnCD=Math.max(18,55-s.speedLevel*3)+Math.floor(Math.random()*25);
    }
  }
  for(const e of s.enemies){
    e.y+=e.speed+s.speed*.7*(s.boostActive?3:1);
    if(!e.passed && e.y>s.player.y+CAR_H){
      e.passed=true; s.score+=10*s.speedLevel;
      s.combo++;
      if(s.combo>1){
        s.comboTimer=80;
        s.floaters.push({x:s.player.x,y:s.player.y-50,text:`x${s.combo}`,size:18,life:1,col:'#ffcc00',vy:-.9});
      }
    }
    // Near miss
    if(!e.nearMissed && !e.passed){
      const dx=Math.abs(e.x-s.player.x), dy=Math.abs(e.y-s.player.y);
      if(dx>=s.hitW/2 && dx<s.hitW/2+26 && dy<58){
        e.nearMissed=true; s.score+=20*s.speedLevel;
        s.floaters.push({x:s.player.x,y:s.player.y-44,text:'CLOSE CALL! 😅',size:15,life:1,col:'#ffaa00',vy:-.85});
      }
    }
  }
  if(s.comboTimer>0) s.comboTimer--; else if(s.comboTimer===0) s.combo=0;

  // Eggs
  s.eggSpawnCD--;
  if(s.eggSpawnCD<=0){ s.eggs.push({x:LANES[Math.floor(Math.random()*4)],y:-50}); s.eggSpawnCD=520+Math.floor(Math.random()*400); }
  for(const egg of s.eggs){
    egg.y+=s.speed*.85;
    if(Math.abs(egg.x-s.player.x)<30 && Math.abs(egg.y-s.player.y)<38){
      egg.collected=true;
      if(s.lives<5){ s.lives++; s.floaters.push({x:egg.x,y:egg.y-30,text:'❤️ +1 LIFE!',size:20,life:1,col:'#ffd700',vy:-1.1}); }
      else { s.floaters.push({x:egg.x,y:egg.y-30,text:'✨ FULL HEALTH!',size:17,life:1,col:'#ffd700',vy:-1.1}); }
      playSound('egg');
      for(let i=0;i<16;i++){const a=(i/16)*Math.PI*2; s.particles.push({x:egg.x,y:egg.y,vx:Math.cos(a)*(2+Math.random()*4),vy:Math.sin(a)*(2+Math.random()*4),life:1,r:3+Math.random()*4,col:i%2===0?'#ffd700':'#fff9a0',expl:true});}
    }
  }
  s.eggs=s.eggs.filter(e=>!e.collected&&e.y<H+80);

  // Nitro cans
  s.nitroCanCD--;
  if(s.nitroCanCD<=0 && !s.nitroCan && s.nitroCount<3){
    s.nitroCan={x:LANES[Math.floor(Math.random()*4)],y:-50};
    s.nitroCanCD=500+Math.floor(Math.random()*300);
  }
  if(s.nitroCan){
    s.nitroCan.y+=s.speed*.85;
    if(Math.abs(s.nitroCan.x-s.player.x)<28 && Math.abs(s.nitroCan.y-s.player.y)<36){
      s.nitroCount=Math.min(3,s.nitroCount+1);
      s.floaters.push({x:s.nitroCan.x,y:s.nitroCan.y-30,text:'⚡ NITRO!',size:18,life:1,col:'#00ccff',vy:-1});
      playSound('nitro');
      s.nitroCan=null; s.nitroCanCD=500+Math.floor(Math.random()*300);
    } else if(s.nitroCan.y>H+60){ s.nitroCan=null; }
  }

  // Coins
  s.coinCD--;
  if(s.coinCD<=0 && s.coins.length<5){
    s.coins.push({x:LANES[Math.floor(Math.random()*4)],y:-30});
    s.coinCD=200+Math.floor(Math.random()*150);
  }
  for(const coin of s.coins){
    coin.y+=s.speed*.9;
    if(Math.abs(coin.x-s.player.x)<22 && Math.abs(coin.y-s.player.y)<28){
      coin.collected=true; s.score+=15*s.speedLevel;
      s.floaters.push({x:coin.x,y:coin.y-24,text:`+${15*s.speedLevel}`,size:14,life:1,col:'#ffd700',vy:-.8});
      playSound('coin');
    }
  }
  s.coins=s.coins.filter(c=>!c.collected&&c.y<H+60);

  // Collisions
  if(s.player.invincible>0){ s.player.invincible--; }
  else if(!s.boostActive){
    for(const e of s.enemies){
      if(e.y<-80) continue;
      if(Math.abs(e.x-s.player.x)<s.hitW/2 && Math.abs(e.y-s.player.y)<68){
        s.lives--; s.player.invincible=130; s.player.flash=25;
        s.combo=0; s.comboTimer=0; s.shakeTimer=22;
        playSound('crash');
        for(let i=0;i<28;i++){const a=Math.random()*Math.PI*2,sp=2+Math.random()*7; s.particles.push({x:e.x,y:e.y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,r:4+Math.random()*6,col:Math.random()<.5?'#ff4400':'#ffcc00',expl:true});}
        s.floaters.push({x:e.x,y:e.y-40,text:'💥 CRASH!',size:20,life:1,col:'#ff4400',vy:-1});
        e.y=H+300;
        if(s.lives===1 && !s.lastLifeWarned){ s.lastLifeWarned=true; }
        if(s.lives<=0){ s.phase='dead'; endGame(); }
        break;
      }
    }
  }

  // Particles
  for(const p of s.particles){ p.x+=p.vx; p.y+=p.vy; if(p.expl){p.vy+=.25;p.life-=.025;}else{p.vy+=.08;p.life-=.045;} }
  s.particles=s.particles.filter(p=>p.life>0);
  s.enemies=s.enemies.filter(e=>e.y<H+150);

  // Floaters
  for(const f of s.floaters){ f.y+=f.vy; f.life-=.018; }
  s.floaters=s.floaters.filter(f=>f.life>0);

  // Drift trails
  for(const t of s.driftTrails){ t.y+=s.speed*.4; t.life-=.033; }
  s.driftTrails=s.driftTrails.filter(t=>t.life>0);

  // Celeb particles
  for(const p of s.celebParticles){ p.x+=p.vx; p.y+=p.vy; p.vy+=.14; p.life-=.014; }
  s.celebParticles=s.celebParticles.filter(p=>p.life>0);

  // Shake
  if(s.shakeTimer>0){
    const i=Math.min(s.shakeTimer,7);
    gameWrapper.style.transform=`translate(${(Math.random()-.5)*i*2}px,${(Math.random()-.5)*i}px)`;
    s.shakeTimer--;
  } else { gameWrapper.style.transform=''; }

  if(s.player.flash>0) s.player.flash--;

  // HUD updates
  hudScore.textContent=`Score: ${s.score}`;
  hudBest.textContent=`Best: ${best}`;
  hudLives.textContent='❤️'.repeat(s.lives)+'🖤'.repeat(Math.max(0,3-s.lives));
  hudSpeed.textContent=`Lvl ${s.speedLevel}`;
  const ns=s.nitroCount>=3?'⚡⚡⚡':s.nitroCount===2?'⚡⚡○':s.nitroCount===1?'⚡○○':'○○○';
  hudNitro.textContent=ns; hudNitro.style.color=s.nitroCount>=3?'#00ddff':s.nitroCount>0?'#0077aa':'#333';
  btnBoost.classList.toggle('ready', s.nitroCount>=3 && !s.boostActive);

  if(s.frameCount%30===0){
    const rank=getLiveRank(s.score);
    if(rank>0 && lbLastRank>0 && rank<lbLastRank){
      s.floaters.push({x:W/2,y:H/2-30,text:`#${rank} OVERTAKE! 🏁`,size:19,life:1,col:'#00ff88',vy:-.55});
    }
    if(rank>0) lbLastRank=rank;
    hudRank.textContent=rank>0?`#${rank}`:'';
    renderLb(s.score);
  }
}

// ── Draw frame ────────────────────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0,0,W,H);
  drawRoad();
  drawDriftTrails();
  drawParticles();
  for(const e of state.enemies) drawEnemy(e);
  for(const egg of state.eggs) drawEgg(egg);
  if(state.nitroCan) drawNitroCan(state.nitroCan.x, state.nitroCan.y);
  for(const c of state.coins) drawCoin(c.x,c.y);

  const {x,y,flash,invincible}=state.player;
  const revOff=state.phase==='intro'?state.revBounce:0;
  const alpha=invincible>0?(Math.floor(Date.now()/80)%2===0?.35:1):1;
  ctx.globalAlpha=alpha;
  drawPlayerCar(x,y+revOff,flash>0,state.boostActive);
  ctx.globalAlpha=1;

  if(state.boostActive){ drawSpeedLines(); drawBoostOverlay(); }

  drawCelebParticles();
  drawFloaters();
  drawLowLifeVignette();

  if(state.speedFlash>0){
    ctx.globalAlpha=(state.speedFlash/90)*.25;
    ctx.fillStyle='#e30000'; ctx.fillRect(0,0,W,H);
    ctx.globalAlpha=1;
  }
}

// ── End game ──────────────────────────────────────────────────────────────────
function spawnCelebration() {
  for(let i=0;i<48;i++){
    const a=Math.random()*Math.PI*2, sp=3+Math.random()*7;
    state.celebParticles.push({
      x:W/2, y:H/2, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp-3,
      life:1, r:4+Math.random()*5,
      col:['#ffd700','#ffee00','#fff9a0','#ff8c00','#ffe066'][Math.floor(Math.random()*5)]
    });
  }
}

let scoreAnimRAF=null;
function animateScoreCounter(target) {
  if(scoreAnimRAF) cancelAnimationFrame(scoreAnimRAF);
  const start=Date.now(), dur=1100;
  function tick(){
    const t=Math.min((Date.now()-start)/dur,1);
    const v=Math.round(t*t*(3-2*t)*target); // smooth step
    finalScoreEl.textContent=`Score: ${v.toLocaleString()}`;
    if(t<1) scoreAnimRAF=requestAnimationFrame(tick);
  }
  scoreAnimRAF=requestAnimationFrame(tick);
}

function endGame() {
  stopEngine(); canvas.style.filter='';
  gameWrapper.style.transform='';
  const isNewBest=state.score>best;
  if(isNewBest){ best=state.score; localStorage.setItem('turboBest',best); spawnCelebration(); }
  playSound('gameover');
  submitScore(state.score,state.speedLevel);
  clearLb(); renderLb(0);
  setTimeout(()=>{
    animateScoreCounter(state.score);
    bestScoreEl.textContent=isNewBest?'🏆 NEW BEST! 🥇':(best>0?`🏆 Best: ${best}`:'');
    startBtn.textContent='RACE AGAIN! 🏁';
    btnPause.textContent='⏸'; btnPause.classList.remove('paused');
    btnBoost.classList.remove('ready','boosting');
    renderOverlayLb();
    overlay.style.display='flex';
    canvas.classList.remove('playing');
  },900);
}

// ── Game control ──────────────────────────────────────────────────────────────
function startGame() {
  initAudio();
  nickname=nicknameInput.value.trim()||'Racer';
  localStorage.setItem('turboNickname',nickname);
  nicknameInput.value=nickname;
  clearLb(); lbLastRank=0; renderLb(0); fetchScores();
  state=initState(startLevel);
  state.phase='intro'; state.introFrame=0;
  overlay.style.display='none';
  canvas.classList.add('playing');
  btnBoost.classList.remove('ready','boosting');
  loop._beep1=false; loop._beep2=false; loop._beepGo=false;
  if(raf){ cancelAnimationFrame(raf); raf=null; }
  startEngine(state.speed);
  if(!raf) loop();
}

function togglePause() {
  if(state.phase==='playing'){
    state.phase='paused'; cancelAnimationFrame(raf); raf=null;
    btnPause.textContent='▶'; btnPause.classList.add('paused'); drawPauseOverlay();
  } else if(state.phase==='paused'){
    state.phase='playing'; btnPause.textContent='⏸'; btnPause.classList.remove('paused'); loop();
  }
}

// ── Main loop ─────────────────────────────────────────────────────────────────
function loop() {
  if(state.phase==='intro'){
    state.introFrame++;
    state.roadOffset=(state.roadOffset+state.speed*.28)%(H/6);
    for(const st of state.stars){st.y+=st.speed; if(st.y>H) st.y=0;}
    // Slide car up with cubic ease-out
    const t=Math.min(state.introFrame/72,1);
    const ease=1-Math.pow(1-t,3);
    state.player.y=(H+70)+(H-120-(H+70))*ease;
    // Rev bounce
    state.revBounce+=.16*state.revDir;
    if(Math.abs(state.revBounce)>3) state.revDir*=-1;
    draw();
    if(state.introFrame>=72){
      state.player.y=H-120; state.phase='countdown';
      countdownStart=Date.now(); playSound('countdown');
    }
    raf=requestAnimationFrame(loop);
  } else if(state.phase==='countdown'){
    state.roadOffset=(state.roadOffset+state.speed*.5)%(H/6);
    for(const st of state.stars){st.y+=st.speed; if(st.y>H) st.y=0;}
    draw(); drawCountdown();
    // Play countdown beeps at whole-second marks
    const elapsed=(Date.now()-countdownStart)/1000;
    if(!loop._beep1 && elapsed>=1){ loop._beep1=true; playSound('countdown'); }
    if(!loop._beep2 && elapsed>=2){ loop._beep2=true; playSound('countdown'); }
    if(!loop._beepGo && elapsed>=3){ loop._beepGo=true; playSound('go'); }
    raf=requestAnimationFrame(loop);
  } else if(state.phase==='playing'){
    update(); draw();
    raf=requestAnimationFrame(loop);
  } else if(state.phase==='dead' && state.celebParticles.length>0) {
    // Animate celebration confetti after game over
    for(const p of state.celebParticles){ p.x+=p.vx; p.y+=p.vy; p.vy+=.14; p.life-=.014; }
    state.celebParticles=state.celebParticles.filter(p=>p.life>0);
    draw();
    raf=requestAnimationFrame(loop);
  } else {
    raf=null;
  }
}
// Clear countdown flags on each startGame call (already handled by state reset)
loop._beep1=false; loop._beep2=false; loop._beepGo=false;

// ── Input ─────────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if(e.key==='ArrowLeft')  state.keys.left=true;
  if(e.key==='ArrowRight') state.keys.right=true;
  if(e.key==='p'||e.key==='P') togglePause();
  if((e.key==='b'||e.key==='B')&&state.phase==='playing') activateBoost();
  if(e.key===' '&&state.phase==='playing'){ activateBoost(); e.preventDefault(); }
  if((e.key===' '||e.key==='Enter')&&(state.phase==='idle'||state.phase==='dead')) startGame();
  if(['ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
});
document.addEventListener('keyup', e => {
  if(e.key==='ArrowLeft')  state.keys.left=false;
  if(e.key==='ArrowRight') state.keys.right=false;
});

function holdBtn(btn,key){
  const on=e=>{ e.preventDefault(); state.keys[key]=true;  btn.classList.add('pressed'); };
  const off=e=>{ e.preventDefault(); state.keys[key]=false; btn.classList.remove('pressed'); };
  btn.addEventListener('touchstart',on,{passive:false}); btn.addEventListener('touchend',off,{passive:false});
  btn.addEventListener('touchcancel',off,{passive:false}); btn.addEventListener('mousedown',on);
  btn.addEventListener('mouseup',off); btn.addEventListener('mouseleave',off);
}
holdBtn(btnLeft,'left'); holdBtn(btnRight,'right');
startBtn.addEventListener('click',startGame);
btnPause.addEventListener('click',togglePause);
btnBoost.addEventListener('click',()=>{ initAudio(); activateBoost(); });

// ── Init ──────────────────────────────────────────────────────────────────────
drawPreview();
drawRoad();
hudBest.textContent=`Best: ${best}`;
cachedScores=[]; fetchScores(); renderLb(0); renderOverlayLb();
setInterval(()=>{ if(state.phase==='playing'||state.phase==='paused') fetchScores(); },30000);
</script>
